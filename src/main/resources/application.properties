# ค่าพื้นฐานที่ commit ร่วมทีม — ไม่ใส่ secret ที่นี่
# รหัส/ URL DB จริง: ตั้งผ่าน env (SPRING_DATASOURCE_*) หรือไฟล์ application-local.properties (เฉพาะเครื่อง)
spring.application.name=course-flow-server
server.port=${PORT:8080}
server.address=0.0.0.0

logging.level.org.springframework=INFO
logging.level.com.techup=DEBUG

# Datasource: ค่าว่างได้ถ้าโหลดจาก local-only properties / CI ใส่ env
spring.datasource.url=${SPRING_DATASOURCE_URL:}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

# Disable PostgreSQL prepared statement caching to avoid "prepared statement does not exist" errors
spring.datasource.hikari.data-source-properties.prepareThreshold=0
spring.datasource.hikari.connection-test-query=SELECT 1
spring.datasource.hikari.validation-timeout=30000
spring.datasource.hikari.data-source-properties.preferQueryMode=simple

# Hikari: Supabase pooler session mode limits concurrent clients (often ~15 total). Defaults here stay
# small so deploy + local/dev tools sharing one DB does not exhaust the pool (EMAXCONNSESSION).
spring.datasource.hikari.maximum-pool-size=${HIKARI_MAX_POOL:4}
spring.datasource.hikari.minimum-idle=${HIKARI_MIN_IDLE:1}

spring.jpa.hibernate.ddl-auto=update
# Explicit dialect: avoids Hibernate failing to infer dialect when JDBC URL/env is missing or metadata is unavailable (e.g. deploy misconfiguration).
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=true

# Batch insert/update: groups multiple inserts into a single JDBC round-trip.
# Works well with UUID IDs (UuidGenerator) unlike IDENTITY sequences.
spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.batch_versioned_data=true

supabase.url=${SUPABASE_URL:}
supabase.bucket=${SUPABASE_BUCKET:uploads}
supabase.apiKey=${SUPABASE_API_KEY:}
# Server-side Storage uploads (images, files). Use service_role from Supabase Dashboard → API (not anon).
supabase.service-key=${SUPABASE_SERVICE_ROLE_KEY:${SUPABASE_SERVICE_KEY:}}

# Cloudinary signed video uploads (admin trailer / sub-lesson video).
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:}
cloudinary.api-key=${CLOUDINARY_API_KEY:}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:}

# Must match UploadValidators max sizes (video up to 500 MB).
spring.servlet.multipart.max-file-size=500MB
spring.servlet.multipart.max-request-size=520MB
jwt.secret=${JWT_SECRET:}
jwt.expiration=${JWT_EXPIRATION:86400000}

omise.secret-key=${OMISE_SECRET_KEY:}
omise.api-base-url=${OMISE_API_BASE_URL:https://api.omise.co}
omise.currency=${OMISE_CURRENCY:thb}
# Payment: verify Omise webhook signature (Base64 secret จาก Dashboard; ว่าง = ไม่ verify)
omise.webhook-secret=${OMISE_WEBHOOK_SECRET:}
omise.webhook-timestamp-tolerance-seconds=${OMISE_WEBHOOK_TIMESTAMP_TOLERANCE:300}

# Payment API ใช้ Bearer จาก Supabase — ต้อง JWKS ที่ถูกต้อง + ES256 (คนละ path กับ /auth/v1/jwks เปล่าๆ)
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${supabase.url}/auth/v1/.well-known/jwks.json
spring.security.oauth2.resourceserver.jwt.jws-algorithms=ES256

# logging.level.org.springframework.security=TRACE
spring.config.import=optional:classpath:/application-local.properties

logging.level.org.hibernate.orm.jdbc.warn=ERROR
# logging.level.org.springframework.web=DEBUG
