# ค่าพื้นฐานที่ commit ร่วมทีม — ไม่ใส่ secret ที่นี่
# รหัส/ URL DB จริง: ตั้งผ่าน env (SPRING_DATASOURCE_*) หรือไฟล์ application-local.properties (เฉพาะเครื่อง)
spring.application.name=course-flow-server
server.port=${PORT:8080}
server.address=0.0.0.0

logging.level.org.springframework=INFO
logging.level.com.techup=DEBUG

# Datasource: ค่าว่างได้ถ้าโหลดจาก local-only properties / CI ใส่ env
spring.datasource.url=${SPRING_DATASOURCE_URL:}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

# เดิม (ก่อนแก้): ไม่มีบรรทัด Hikari ที่นี่ → Spring Boot ใช้ default ของ connection pool เอง
# (โดยทั่วไปเทียบเท่ากับ pool ใหญ่กว่าการตั้ง 5 แบบ local Supabase)
# ถ้าต่อ Supabase แล้วชนโควต้า pooler ให้แก้ที่เครื่องตัวเอง (application-local / env) เท่านั้น
# ไม่บังคับ HIKARI_* ในไฟล์นี้เพื่อไม่กระทบเพื่อนใน repo ที่ไม่ได้ใช้สภาพเดียวกัน
# --- ตัวอย่างถ้าอยาก override ด้วย env (ไม่เปิดใช้จนกว่าจะตั้ง env) ---
# spring.datasource.hikari.maximum-pool-size=${HIKARI_MAX_POOL:10}
# spring.datasource.hikari.minimum-idle=${HIKARI_MIN_IDLE:1}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=true

# Batch insert/update: groups multiple inserts into a single JDBC round-trip.
# Works well with UUID IDs (UuidGenerator) unlike IDENTITY sequences.
spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.batch_versioned_data=true

supabase.url=${SUPABASE_URL:}
supabase.bucket=${SUPABASE_BUCKET:uploads}
supabase.apiKey=${SUPABASE_API_KEY:}
jwt.secret=${JWT_SECRET:}
jwt.expiration=${JWT_EXPIRATION:86400000}

spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${SUPABASE_URL:}/auth/v1/jwks
# logging.level.org.springframework.security=TRACE
spring.config.import=optional:classpath:/application-local.properties

logging.level.org.hibernate.orm.jdbc.warn=ERROR